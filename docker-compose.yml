version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "37888:37888"
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    environment:
      - JWT_SECRET=change-this-to-a-random-secret
      - ADMIN_JWT_SECRET=change-this-to-another-random-secret
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:37888
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-uploads:
